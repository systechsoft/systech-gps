<title>SYSTECH GPS Emergencia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f2f5f9;color:#1a2332;font-size:16px;-webkit-font-smoothing:antialiased;}
#screen{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
header{background:#fff;border-bottom:2px solid #e8edf4;padding:11px 15px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.07);}
header img{width:36px;height:36px;object-fit:contain;}
.htitle h1{font-size:15px;font-weight:800;color:#1a2332;}
.htitle .hsub{font-size:10px;color:#94a3b8;}
.sos-pill{background:#fff0f0;border:1.5px solid #fca5a5;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;color:#dc2626;margin-left:auto;white-space:nowrap;}
#content{flex:1;overflow-y:auto;padding:14px 13px 80px;-webkit-overflow-scrolling:touch;}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:2px solid #e8edf4;display:flex;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
.nb{flex:1;padding:9px 2px 7px;text-align:center;cursor:pointer;border:none;background:transparent;color:#94a3b8;font-size:9px;font-weight:700;letter-spacing:.4px;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.nb .ic{font-size:22px;line-height:1;}
.nb.on{color:#dc2626;}
.card{background:#fff;border:1.5px solid #e8edf4;border-radius:14px;padding:16px;margin-bottom:11px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.ctitle{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:13px;font-weight:700;}
label{display:block;font-size:13px;color:#374151;margin-bottom:5px;margin-top:12px;font-weight:600;}
label:first-child{margin-top:0;}
input[type=text],textarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 14px;color:#1a2332;font-size:15px;outline:none;transition:.2s;-webkit-appearance:none;font-family:inherit;}
input:focus,textarea:focus{border-color:#dc2626;background:#fff;box-shadow:0 0 0 3px #fca5a522;}
input::placeholder,textarea::placeholder{color:#b0bcc8;}
textarea{resize:none;height:80px;line-height:1.5;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;text-align:center;margin-top:10px;font-family:inherit;line-height:1;}
.btn:active{transform:scale(.97);}
.btn-red{background:#dc2626;color:#fff;}
.btn-dark{background:#1a2332;color:#fff;}
.btn-light{background:#f8fafc;color:#374151;border:1.5px solid #e2e8f0;}
.btn-green{background:#16a34a;color:#fff;}
.btn-orange{background:#ea580c;color:#fff;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.dg{background:#16a34a;box-shadow:0 0 5px #16a34a88;}
.dy{background:#d97706;}
.dgr{background:#94a3b8;}
@keyframes ping{0%,100%{box-shadow:0 0 0 0 #16a34a66;}50%{box-shadow:0 0 0 6px #16a34a00;}}
.ping{animation:ping 1.5s infinite;}
.al{border-radius:10px;padding:11px 13px;font-size:13px;margin:8px 0;line-height:1.55;}
.al-r{background:#fef2f2;border:1.5px solid #fecaca;color:#b91c1c;}
.al-g{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#15803d;}
.al-b{background:#eff6ff;border:1.5px solid #bfdbfe;color:#1d4ed8;}
.al-y{background:#fffbeb;border:1.5px solid #fde68a;color:#92400e;}
.al-gr{background:#f8fafc;border:1.5px solid #e2e8f0;color:#475569;}
.al-orange{background:#fff7ed;border:1.5px solid #fed7aa;color:#c2410c;}
.locbox{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.8;margin-top:10px;color:#374151;}
.mapwrap{border-radius:12px;overflow:hidden;background:#e8edf4;border:1.5px solid #e2e8f0;height:240px;position:relative;margin-top:10px;}
.mapwrap iframe{width:100%;height:100%;border:0;position:absolute;top:0;left:0;}
.mapph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;text-align:center;gap:6px;font-size:13px;}
.pcard{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1.5px solid #f1f5f9;}
.pcard:last-child{border-bottom:none;padding-bottom:0;}
.av{width:42px;height:42px;border-radius:50%;background:#fef2f2;border:2px solid #fecaca;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#dc2626;flex-shrink:0;}
.pi{flex:1;min-width:0;}
.pi h3{font-size:14px;font-weight:700;}
.pi .ploc{font-size:12px;color:#64748b;margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pi .pt{font-size:11px;color:#94a3b8;margin-top:3px;display:flex;align-items:center;}
.vbtn{background:#dc2626;border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0;font-family:inherit;}
#wm{position:fixed;bottom:62px;right:10px;opacity:.1;pointer-events:none;z-index:50;display:flex;align-items:center;gap:4px;}
#wm img{width:24px;height:24px;}
#wm span{font-size:8px;font-weight:800;letter-spacing:2px;color:#1a2332;}
@keyframes sp{to{transform:rotate(360deg);}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
.spin-gr{border-color:rgba(0,0,0,.1);border-top-color:#374151;}
.sm{font-size:12px;color:#64748b;line-height:1.6;}
.mt8{margin-top:8px;}
.sharelink-box{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px;font-size:12px;color:#1d4ed8;word-break:break-all;margin-top:5px;font-family:monospace;line-height:1.5;}
.tbl-wrap{overflow-x:auto;margin-top:10px;border-radius:10px;border:1.5px solid #e2e8f0;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:420px;}
th{background:#f1f5f9;color:#374151;font-weight:700;padding:8px 10px;text-align:left;white-space:nowrap;}
td{padding:8px 10px;border-top:1px solid #f1f5f9;color:#1a2332;vertical-align:top;}
tr:nth-child(even) td{background:#fafbfd;}
.btn-excel{background:#1d6f42;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;}
/* CONFIG PANEL */
.cfg-step{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:10px;}

.cfg-step .sm{color:#78350f;}
.cfg-input{width:100%;background:#fff;border:1.5px solid #fcd34d;border-radius:8px;padding:10px 12px;font-size:13px;color:#1a2332;outline:none;font-family:monospace;margin-top:6px;}
.cfg-input:focus{border-color:#f59e0b;}

async function dbSavePerson(name, lugar, lat, lon, acc){
  if(!db) return false;
  const key = name.toLowerCase().trim().replace(/[.#$/\[\]]/g,'_');
  const r = ref(db, 'personas/'+key);
  const snap = await get(r);
  const existing = snap.exists() ? snap.val() : {};
  await set(r, {
    name: name.trim(),
    lugar: lugar ? lugar.trim() : (existing.lugar||null),
    lat: lat!=null ? lat : (existing.lat||null),
    lon: lon!=null ? lon : (existing.lon||null),
    acc: acc!=null ? acc : (existing.acc||null),
    ts: Date.now()
  });
  return true;
}

async function dbGetAll(){
  if(!db) return [];
  const snap = await get(ref(db,'personas'));
  if(!snap.exists()) return [];
  return Object.values(snap.val()).sort((a,b)=>(b.ts||0)-(a.ts||0));
}

async function dbFind(query){
  const all = await dbGetAll();
  const q = query.toLowerCase().trim();
  return all.find(p=> p.name.toLowerCase()===q || p.name.toLowerCase().includes(q)) || null;
}

function dbListen(callback){
  if(!db) return;
  if(unsubscribe) unsubscribe();
  const r = ref(db,'personas');
  unsubscribe = onValue(r, snap=>{
    if(!snap.exists()){ callback([]); return; }
    callback(Object.values(snap.val()).sort((a,b)=>(b.ts||0)-(a.ts||0)));
  });
}

async function dbDeleteAll(){
  if(!db) return;
  await remove(ref(db,'personas'));
}

window.iniciarGPS = function(){
  const n=document.getElementById('n1').value.trim();
  if(!n){alert('Escribí tu nombre primero');return;}
  currentName=n;
  document.getElementById('gpspanel').style.display='block';
  if(!navigator.geolocation){setGPSSt('❌ GPS no disponible. Usá la Opción 2.','al-r');return;}
  setGPSSt('<span class="dot dy"></span> Solicitando permiso de ubicación...','al-gr');
  const btn=document.getElementById('gpsbtn');
  btn.innerHTML='<span class="spin"></span>Obteniendo GPS...';
  btn.disabled=true;
  navigator.geolocation.getCurrentPosition(onGPS, onGPSErr, {enableHighAccuracy:true,timeout:25000,maximumAge:0});
};

async function onGPS(p){
  const lat=p.coords.latitude, lon=p.coords.longitude, acc=p.coords.accuracy;
  setGPSSt('<span class="dot dy"></span> Guardando en base de datos...','al-gr');
  const ok = await dbSavePerson(currentName,null,lat,lon,acc);
  if(ok){
    setGPSSt('<span class="dot dg ping"></span> ✅ Ubicación guardada — visible para todos','al-g');
  } else {
    setGPSSt('<span class="dot dg ping"></span> ✅ GPS obtenido (sin Firebase — configurar en ⚙️)','al-y');
  }
  const el=document.getElementById('coordsbox');
  el.style.display='block';
  el.innerHTML='<b>Lat:</b> '+lat.toFixed(5)+'&nbsp;&nbsp;<b>Lon:</b> '+lon.toFixed(5)+'<br><b>Precisión:</b> ±'+Math.round(acc)+'m';
  document.getElementById('gpsts').textContent='Actualizado: '+new Date().toLocaleTimeString('es');
  document.getElementById('sharepanel').style.display='block';
  document.getElementById('sharelink').textContent=makeLink(currentName);
  const btn=document.getElementById('gpsbtn');
  btn.innerHTML='📡 Actualizar GPS';
  btn.disabled=false;
}

function onGPSErr(e){
  const m={
    1:'Permiso denegado.\n\n📱 iPhone: Ajustes → Privacidad → Localización → Safari → Permitir\n📱 Android: tocá el 🔒 en la barra → Ubicación → Permitir\n\nO usá la Opción 2 abajo.',
    2:'Señal GPS débil. Probá en exterior o usá la Opción 2.',
    3:'Tiempo agotado. Intentá de nuevo o usá la Opción 2.'
  };
  alert(m[e.code]||'Error GPS. Usá la Opción 2.');
  setGPSSt('❌ Error GPS — usá la Opción 2','al-r');
  const btn=document.getElementById('gpsbtn');
  btn.innerHTML='📡 Reintentar GPS';
  btn.disabled=false;
}

function setGPSSt(html,cls){
  const el=document.getElementById('gpsst');
  if(el){el.className='al '+(cls||'al-gr');el.innerHTML=html;}
}

window.toggleTracking = function(){
  if(tracking){
    if(watchId!=null) navigator.geolocation.clearWatch(watchId);
    tracking=false;watchId=null;
    document.getElementById('trbtn').className='btn btn-green';
    document.getElementById('trbtn').textContent='▶ Activar seguimiento en tiempo real';
    document.getElementById('trst').style.color='#94a3b8';
    document.getElementById('trst').textContent='Seguimiento inactivo';
  } else {
    if(!navigator.geolocation){alert('GPS no disponible');return;}
    if(!currentName){alert('Primero usá la opción GPS arriba');return;}
    tracking=true;
    document.getElementById('trbtn').className='btn btn-red';
    document.getElementById('trbtn').textContent='⏹ Detener seguimiento';
    document.getElementById('trst').style.color='#16a34a';
    document.getElementById('trst').innerHTML='<span class="dot dg ping"></span> Actualizando en tiempo real...';
    watchId=navigator.geolocation.watchPosition(async p=>{
      await dbSavePerson(currentName,null,p.coords.latitude,p.coords.longitude,p.coords.accuracy);
      const el=document.getElementById('coordsbox');
      if(el){el.style.display='block';el.innerHTML='<b>Lat:</b> '+p.coords.latitude.toFixed(5)+'&nbsp;&nbsp;<b>Lon:</b> '+p.coords.longitude.toFixed(5)+'<br><b>Precisión:</b> ±'+Math.round(p.coords.accuracy)+'m';}
      const ts=document.getElementById('gpsts');
      if(ts) ts.textContent='Actualizado: '+new Date().toLocaleTimeString('es');
    },onGPSErr,{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
  }
};

  const ago=Math.round((Date.now()-person.ts)/1000);

    ${hasCoords?`<div class="locbox" style="margin-top:8px;"><b>GPS:</b> ${person.lat.toFixed(5)}, ${person.lon.toFixed(5)}<br><b>Precisión:</b> ±${Math.round(person.acc||0)}m</div>`:''}

      }
    },300);
  }
};

window.exportarCSV = async function(){
  const people=await dbGetAll();
  if(!people.length){alert('No hay datos para exportar');return;}
  const rows=[['Nombre','Lugar (manual)','Latitud','Longitud','Precision (m)','Tipo','Fecha y hora']];
  people.forEach(p=>{
    rows.push([p.name,p.lugar||'',p.lat!=null?p.lat.toFixed(6):'',p.lon!=null?p.lon.toFixed(6):'',p.acc!=null?Math.round(p.acc):'',p.lugar?'Manual':'GPS',new Date(p.ts).toLocaleString('es')]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='systech_ubicaciones_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
};

function makeLink(name){
  return location.href.split('#')[0].split('?')[0]+'#ver='+encodeURIComponent(name);
}
window.copiar = function(srcId,okId){
  const txt=(document.getElementById(srcId)||{textContent:''}).textContent.trim();
  const show=()=>{const el=document.getElementById(okId);if(el){el.style.display='block';setTimeout(()=>el.style.display='none',2500);}};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(show).catch(()=>fbCopy(txt,show));
  } else { fbCopy(txt,show); }
};
function fbCopy(txt,cb){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');if(cb)cb();}catch(e){prompt('Copiá este enlace:',txt);}
  document.body.removeChild(ta);
}
function esc(s){
  return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}
